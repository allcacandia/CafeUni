<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Grand Central</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .login-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      color: #111;
    }

    .login-card p {
      font-size: 0.8rem;
      text-align: center;
      color: #888;
    }

    .campo {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .campo label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #111;
    }

    .campo input {
      border: 1.5px solid #ddd;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: 'Montserrat', sans-serif;
      outline: none;
      transition: border 0.2s;
    }

    .campo input:focus {
      border-color: #111;
    }

    .error {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #cc0000;
      padding: 0.75rem;
      border-radius: 10px;
      font-size: 0.85rem;
      text-align: center;
    }

    .btn-login {
      background: #111;
      color: #fff;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background 0.2s;
    }

    .btn-login:hover {
      background: #333;
    }
  </style>
</head>

<body>
<div class="login-card">
  <h2>Panel de Administración</h2>
  <p>Grand Central – UTP</p>

  <div th:if="${error}" class="error">
    <span th:text="${error}"></span>
  </div>

  <form th:action="@{/gestion-interna/login-process}" method="post">
    <div style="display:flex; flex-direction:column; gap:1rem;">
      <div class="campo">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="usuario"/>
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="contraseña"/>
      </div>
      <button type="submit" class="btn-login" id="btn-login"
              th:disabled="${bloqueado}">Ingresar</button>
    </div>
  </form>

  <div th:if="${bloqueado}" class="error" id="bloqueo-msg"
       th:data-segundos="${segundos}">
    Demasiados intentos fallidos. Espera
    <span id="contador" th:text="${segundos}"></span> segundos.
  </div>

</div>

<script th:if="${bloqueado}">
  const msg = document.getElementById('bloqueo-msg');
  const btn = document.getElementById('btn-login');
  let restantes = parseInt(msg.getAttribute('data-segundos'));
  const contador = document.getElementById('contador');

  btn.disabled = true;

  const intervalo = setInterval(() => {
    restantes--;
    contador.textContent = restantes;

    if (restantes <= 0) {
      clearInterval(intervalo);
      msg.style.display = 'none';
      btn.disabled = false;
    }
  }, 1000);
</script>
</body>
</html>
