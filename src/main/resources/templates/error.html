<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Algo salió mal – Grand Central</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    .codigo {
      font-size: 5rem;
      font-weight: 800;
      color: #f5a623;
    }
    h1 {
      font-size: 1.3rem;
      margin: 1rem 0 0.5rem;
    }
    p {
      color: #aaa;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    a {
      background: #f5a623;
      color: #111;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
<div>
  <div class="codigo" th:text="${status}">Error</div>
  <h1>Algo no salió como esperábamos</h1>
  <p>Intenta volver al inicio o inténtalo más tarde.</p>
  <a th:href="@{/}">Volver al menú</a>
</div>
</body>
</html>
