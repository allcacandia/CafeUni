<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Central – UTP</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #d6d3cf;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* ── Móvil (base) ── */
        .phone-frame {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            font-size: 10px;
        }

        /* ── Tablet (768px a 1023px) ── */
        @media (min-width: 768px) and (max-width: 1023px) {
            body {
                padding: 32px 16px;
                align-items: flex-start;
            }
            .phone-frame {
                max-width: 560px;
                min-height: calc(100vh - 64px);
                border-radius: 16px;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            }
        }

        /* ── Desktop (1024px+) ── */
        @media (min-width: 1024px) {
            body {
                align-items: flex-start;
                padding: 0;
            }
            .phone-frame {
                width: 100%;
                min-height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
        }

        .top-nav {
            background: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;

        }


        /* ── Hero ── */
        .hero {
            width: 100%;
            height: 270px;
            background: #111111;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero .hero-slot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }

        .hero .background-picture {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .hero .background-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        @media (min-width: 768px) {
            .hero { height: 260px; }
        }

        @media (min-width: 1024px) {
            .hero { height: 320px; }
        }

        /* ── Info ── */
        .info {
            padding: 16px 18px 0;
            flex-shrink: 0;
        }

        .info h1 {
            font-size: 17px;
            font-weight: 600;
            color: #111111;
            margin-bottom: 3px;
        }

        .info .subtitle {
            font-size: 13px;
            color: #666666;
        }

        .divider {
            border: none;
            border-top: 1px solid #e5e3e0;
            margin: 14px 0 0;
        }

        /* ── Spacer: empuja CTA y footer hacia abajo ── */
        .spacer {
            flex: 1;
        }

        /* ── CTA ── */
        .cta {
            padding: 60px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            flex-shrink: 0;
        }

        .cta p {
            font-size: 14px;
            color: #777777;
            text-align: center;
        }

        .btn-menu {
            background: #111111;
            color: #ffffff;
            border: none;
            border-radius: 50px;
            padding: 15px 0;
            width: 100%;
            max-width: 280px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .btn-menu:hover {
            background: #2a2a2a;
        }

        .btn-menu .btn-icon {
            width: 22px;
            height: 22px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-menu .btn-icon svg {
            width: 12px;
            height: 12px;
            fill: #ffffff;
        }

        /* ── Footer ── */
        .footer {
            border-top: 1px solid #e5e3e0;
            padding: 14px 18px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .utp-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 24px;
        }
    </style>
</head>
<body>

<div class="phone-frame">

    <div class="top-nav">
        <a href="https://grandcentral.pe/" rel="home" aria-label="Logo de la página">
            <img
                    width="308" height="65"
                    src="https://grandcentral.pe/wp-content/uploads/2025/10/LOGOTIPO-GRAN-CENTRAL-WHITE-2025.svg"
                    alt="Grand Central"
                    style="max-width: 200px;"
                    decoding="async"
            />
        </a>
    </div>

    <!-- Hero -->
    <div class="hero">

        <div class="background-picture">
            <img
                    src="https://grandcentral.pe/wp-content/uploads/2025/10/Socursal-GB1.jpg"
                    alt="Sucursal Grand Central"
            />
        </div>
    </div>

    <!-- Info -->
    <div class="info">
        <h1>Grand Central</h1>
        <p class="subtitle">Cafeteria universitaria</p>
        <hr class="divider" />
    </div>

    <!-- Spacer: ocupa el espacio libre y empuja CTA + footer al fondo -->
    <div class="spacer"></div>

    <!-- Call to action -->
    <div class="cta">
        <p>Mira lo que hay de menu</p>
        <a href="menu" class="btn-menu">
            Ver Menú
            <span class="btn-icon">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="8" cy="9" r="5" fill="none" stroke="#fff" stroke-width="1.5"/>
                    <line x1="3" y1="9" x2="13" y2="9" stroke="#fff" stroke-width="1.5"/>
                    <line x1="6" y1="3" x2="10" y2="3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </span>
        </a>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="utp-slot">
            <img src="../static/images/LOGOTIPOUTP.png" height="25" width="120"/>
        </div>
    </div>

</div>

</body>
</html>
